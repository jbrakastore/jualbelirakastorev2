<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="banner.jpg">
<title>JBRAKASTORE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <img src="banner.jpg" class="logo-loading">
  <h1>JBRAKA<span>STORE</span></h1>
  <div class="bar">
    <div id="progress"></div>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="logo-wrap">
    <img src="banner.jpg" class="logo">
    <h1>JBRAKA<span>STORE</span></h1>
  </div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="close" onclick="toggleMenu()">✖</div>
  <button onclick="location.reload()" class="btn red">🏠 Beranda</button>
  <button onclick="wa()" class="btn red">📱 WhatsApp</button>
</div>

<!-- BANNER -->
<img src="banner.jpg" class="banner">

<!-- PRODUK -->
<div class="produk">

  <div class="card">
    <img src="banner.jpg">
    <h3>Akun <span class="red-text">Sultan</span></h3>
    <p class="price">Sesuai Spek</p>
    <button onclick="beli()" class="buy">Beli</button>
  </div>

  <div class="card">
    <img src="banner.jpg">
    <h3>Akun <span class="red-text">Murah</span></h3>
    <p class="price">Sesuai Spek</p>
    <button onclick="beli()" class="buy">Beli</button>
  </div>

</div>

<!-- TESTI -->
<div class="testi">
  <div class="stars">⭐⭐⭐⭐⭐</div>
  <p id="testiText">"Cepat & Aman" - Andi</p>
  <div class="dots">
    <span id="d1"></span>
    <span id="d2"></span>
  </div>
</div>

<!-- WHY -->
<div class="why">
  <h2>Kenapa <span class="red-text">JBRAKA?</span></h2>
  <div class="why-box">Harga Termurah</div>
  <div class="why-box">Proses Cepat</div>
  <div class="why-box">Trusted Seller</div>
</div>

<!-- ✅ POPUP (SUDAH DIPOSISI BENAR) -->
<div id="popup">
  <div class="popup-box">
    
    <h2>INFORMASI</h2>

    <img src="link saluran.jpg" class="popup-img">

    <div class="popup-row">
      <button onclick="join()" class="btn red">Join sekarang</button>

      <label class="popup-check">
        <input type="checkbox" id="hideBox">
        Sembunyikan 5 jam
      </label>
    </div>

    <button onclick="closePopup()" class="btn red">Tutup</button>

  </div>
</div>

<script src="script.js"></script>
  <!-- FAKE BUY CONTAINER (opsional) -->
<div id="fakeContainer"></div>
</body>
</html>
